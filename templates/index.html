<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🚀 Media Sharing Server</title>
  <style>
@font-face { font-family: 'Orbitron'; src: url('/static/fonts/Orbitron-Regular.ttf'); font-display: swap; }
body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #0ff; font-family: 'Orbitron', sans-serif; text-align: center; padding: 20px; position: relative; min-height: 100vh; }
.admin-nav { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
.admin-btn { padding: 10px 20px; background: #0ff; color: #000; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 0.9em; box-shadow: 0 0 10px #0ff8; }
.settings-btn { background: #ffc107; }
h1 { font-size: 2em; margin: 40px 0 20px; text-shadow: 0 0 10px #0ff; }
.upload-box { margin-bottom: 30px; padding: 35px; border: 2px solid #0ff; border-radius: 12px; background-color: #00000055; box-shadow: 0 0 15px #0ff8; }
input[type="file"] { width: 70%; padding: 15px; border-radius: 8px; font-size: 2.1em; color: #fff; }
button { padding: 20px 35px; border: none; border-radius: 8px; background-color: #0ff; color: #000; font-weight: bold; cursor: pointer; font-size: 2.1em; }
.gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; padding: 0 20px; justify-items: center; }
.card { width: 300px; height: 480px; background: #012; border: 1px solid #0ff4; border-radius: 10px; padding: 15px; box-shadow: 0 0 15px #0ff3; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transition: 0.3s; }
.card:hover { transform: scale(1.05); box-shadow: 0 0 25px #0ff; }
.media-container { width: 100%; height: 280px; display: flex; justify-content: center; align-items: center; overflow: hidden; border-radius: 6px; border: 1px solid #0ff5; background-color: #000; position: relative; }
.card img { max-width: 100%; max-height: 100%; object-fit: contain; }
.play-icon { position: absolute; font-size: 4em; color: rgba(0,255,255,0.7); pointer-events: none; }
.file-info { font-size: 1.1em; width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: #fff; margin: 10px 0; }
.btns a { display: inline-block; margin: 3px; padding: 8px 15px; border-radius: 5px; color: #fff; font-weight: bold; text-decoration: none; font-size: 0.9em; }
.preview { background: #2196F3; } .download { background: #4CAF50; } .delete { background: #f44336; }
#speedBox { margin-top: 15px; font-size: 1.2em; color: #0f0; }
  </style>
</head>
<body>
<div class="admin-nav">
  {% if is_admin %}
    <a href="{{ url_for('settings') }}" class="admin-btn settings-btn">Settings</a>
    <a href="{{ url_for('logout') }}" class="admin-btn">Logout</a>
  {% else %}
    <a href="{{ url_for('login') }}" class="admin-btn">Admin Login</a>
  {% endif %}
</div>
<h1>🚀 Media Sharing Server</h1>
<div class="upload-box">
  <input type="file" id="fileInput" multiple>
  <button onclick="uploadFiles()">Upload</button>
  <div id="speedBox"></div>
</div>
<div class="gallery">
{% for item in media_items %}
  <div class="card">
    <div class="media-container">
      {% if item.type == 'image' %}<img src="{{ url_for('thumb_file', filename=item.thumb) if item.thumb else url_for('uploaded_file', filename=item.name) }}?v={{ item.cache_buster }}">
      {% elif item.type == 'video' %}<img src="{{ url_for('thumb_file', filename=item.thumb) }}?v={{ item.cache_buster }}"><span class="play-icon">▶</span>
      {% else %}📁{% endif %}
    </div>
    <div class="file-info">{{ item.name }}</div>
    <div class="btns">
      <a href="{{ url_for('uploaded_file', filename=item.name) }}" class="preview" target="_blank">Preview</a>
      <a href="{{ url_for('uploaded_file', filename=item.name) }}" class="download" download>Download</a>
      {% if is_admin %}<a href="{{ url_for('delete_file', folder=item.folder, filename=item.name) }}" class="delete" onclick="return confirm('Confirm Delete?')">Delete</a>{% endif %}
    </div>
  </div>
{% endfor %}
</div>
<script>
function uploadFiles() {
  const files = document.getElementById("fileInput").files; if (!files.length) return;
  const data = new FormData(); for (let f of files) data.append("images", f);
  const xhr = new XMLHttpRequest(); const start = Date.now();
  xhr.upload.onprogress = e => { if (e.lengthComputable) { const percent = ((e.loaded / e.total) * 100).toFixed(1); const speed = (e.loaded / ((Date.now() - start) / 1000) / 1024 / 1024).toFixed(2); speedBox.innerHTML = `Uploading ${percent}% — ${speed} MB/s`; }};
  xhr.onload = () => location.reload(); xhr.open("POST", "/", true); xhr.send(data);
}
</script>
</body>
</html>
