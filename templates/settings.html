<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Settings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); overflow: hidden; }
.ring { position: relative; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center; }
.ring i { position: absolute; inset: 0; border: 4px solid var(--clr); filter: drop-shadow(0 0 15px var(--clr)); transition: 0.5s; border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%; animation: animate 6s linear infinite; }
@keyframes animate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.login { position: absolute; width: 280px; display: flex; flex-direction: column; gap: 15px; }
.login h2 { font-size: 1.8em; color: #fff; text-align: center; }
.inputBx input { width: 100%; padding: 12px 20px; background: rgba(255, 255, 255, 0.1); border: 2px solid #ffc107; border-radius: 40px; color: #fff; outline: none; }
.inputBx input[type="submit"] { background: #ffc107; border: none; cursor: pointer; font-weight: bold; color: #000; }
.msg { color: #0f0; font-size: 0.8em; text-align: center; font-weight: bold; }
.back-link { color: #fff; text-decoration: none; font-size: 0.8em; text-align: center; opacity: 0.7; margin-top: 5px; }
</style>
</head>
<body>
<div class="ring">
  <i style="--clr:#ffc107;"></i><i style="--clr:#ffffff;"></i><i style="--clr:#ff9800;"></i>
  <div class="login">
    <h2>Update Credentials</h2>
    {% if message %}<div class="msg">{{ message }}</div>{% endif %}
    <form method="POST" style="width: 100%; display: flex; flex-direction: column; gap: 15px;">
      <div class="inputBx"><input type="text" name="username" placeholder="New Username" required></div>
      <div class="inputBx"><input type="password" name="password" placeholder="New Password" required></div>
      <div class="inputBx"><input type="submit" value="Save Changes"></div>
      <a href="{{ url_for('index') }}" class="back-link">← Back to Gallery</a>
    </form>
  </div>
</div>
</body>
</html>
